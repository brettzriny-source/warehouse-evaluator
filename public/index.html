<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Site Eval">
<meta name="theme-color" content="#1e40af">
<title>Warehouse Site Evaluator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:#111827;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
input,textarea,select,button{font-family:inherit;font-size:14px}
input,textarea,select{-webkit-appearance:none;border-radius:8px;border:1px solid #d1d5db;padding:10px 12px;width:100%;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
.container{max-width:500px;margin:0 auto;padding:0 16px}
.header{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:40;padding-top:env(safe-area-inset-top)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;max-width:500px;margin:0 auto}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:#dbeafe;color:#1d4ed8;padding:3px 8px;border-radius:999px;font-weight:600}
.settings-btn{padding:8px;border-radius:8px;background:none;border:none}
.settings-btn:active{background:#f3f4f6}
.tabs{display:flex;max-width:500px;margin:0 auto;padding:0 8px}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:#6b7280;transition:all 0.2s}
.tab.active{border-bottom-color:#2563eb;color:#2563eb}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:12px}
.card h3{font-size:13px;font-weight:600;color:#4b5563;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stars{display:flex;gap:4px}
.star-btn{padding:2px;background:none;border:none;line-height:0}
.star-btn svg{width:28px;height:28px}
.criterion{padding:12px;border-bottom:1px solid #f3f4f6}
.criterion:last-child{border-bottom:none}
.criterion-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.criterion-label{font-size:14px;font-weight:500;color:#1f2937;flex:1;padding-top:4px}
.criterion input{background:#f9fafb;font-size:13px;padding:8px 10px}
.section-pills{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;-webkit-overflow-scrolling:touch}
.section-pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid #e5e7eb;background:#fff;color:#4b5563;white-space:nowrap}
.pill.active{background:#2563eb;color:#fff;border-color:#2563eb}
.pill.done{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.pill svg{width:16px;height:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;font-size:14px;font-weight:600;border:none;width:100%}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:active{background:#1d4ed8}
.btn-secondary{background:#fff;color:#2563eb;border:2px solid #2563eb}
.btn-secondary:active{background:#eff6ff}
.btn-photo{background:#2563eb;color:#fff;padding:10px 16px;border-radius:8px;width:auto;font-size:13px;display:flex;align-items:center;gap:6px}
.btn-photo:active{background:#1d4ed8}
.btn-nav{flex:1}
.nav-row{display:flex;gap:12px;margin-top:16px}
.photos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.photo-thumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
.photo-thumb img{width:100%;height:100px;object-fit:cover;display:block}
.photo-thumb .photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-remove{position:absolute;top:4px;right:4px;background:#ef4444;color:#fff;border:none;border-radius:999px;width:22px;height:22px;font-size:14px;line-height:22px;text-align:center;padding:0}
.canvas-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.tool-btn{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;border:none;background:#f3f4f6;color:#374151}
.tool-btn.active{background:#2563eb;color:#fff}
.tool-btn.danger{background:#fef2f2;color:#dc2626}
.canvas-wrap{border:2px solid #e5e7eb;border-radius:12px;overflow:hidden;touch-action:none}
.canvas-wrap canvas{width:100%;display:block}
.score-hero{background:linear-gradient(135deg,#2563eb,#1e3a8a);border-radius:16px;padding:24px;color:#fff;text-align:center;margin-bottom:12px}
.score-hero .label{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:0.8}
.score-hero .big{font-size:48px;font-weight:800;margin:4px 0}
.score-hero .sub{font-size:12px;opacity:0.8}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:6px}
.score-row .name{font-size:13px;font-weight:500}
.score-row .detail{font-size:11px;color:#6b7280}
.score-bar-wrap{display:flex;align-items:center;gap:8px}
.score-bar{width:80px;height:6px;background:#f3f4f6;border-radius:999px;overflow:hidden}
.score-bar-fill{height:100%;background:#3b82f6;border-radius:999px}
.score-num{font-size:18px;font-weight:700;min-width:28px;text-align:right}
.score-green{color:#16a34a}.score-yellow{color:#ca8a04}.score-red{color:#dc2626}.score-gray{color:#9ca3af}
.flags{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px;margin-bottom:12px}
.flags h3{font-size:13px;font-weight:600;color:#b91c1c;margin-bottom:8px}
.flag-item{font-size:13px;color:#991b1b;padding:6px 0;border-bottom:1px solid #fecaca}
.flag-item:last-child{border:none}
.flag-item .flag-note{font-size:11px;color:#dc2626;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:20px}
.modal h2{font-size:18px;font-weight:700}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-close{background:none;border:none;font-size:24px;padding:4px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.modal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.modal-row input{flex:1}
.modal-remove{padding:6px;background:none;border:none;color:#ef4444}
.modal-add{background:none;border:none;color:#2563eb;font-size:13px;font-weight:600;padding:4px 0;display:flex;align-items:center;gap:4px}
.modal-actions{display:flex;gap:12px;margin-top:16px}
.modal-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600}
.modal-cancel{background:#fff;border:1px solid #d1d5db;color:#374151}
.modal-save{background:#2563eb;border:none;color:#fff}
.measure-label{font-size:11px;color:#6b7280;margin-bottom:2px}
.text-xs{font-size:12px;color:#6b7280;text-align:center;margin-top:8px}
.hidden{display:none}
.flex-center{display:flex;align-items:center;gap:6px}
.submit-progress{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
.submit-progress .prog-bar{width:100%;height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:8px 0}
.submit-progress .prog-fill{height:100%;background:#2563eb;border-radius:999px;transition:width 0.3s}
.submit-progress .prog-text{font-size:13px;color:#4b5563}
.submit-progress .prog-status{font-size:12px;color:#6b7280;margin-top:4px}
.btn-submit{background:#16a34a;color:#fff}
.btn-submit:active{background:#15803d}
.btn-submit:disabled{background:#9ca3af;cursor:not-allowed}
.success-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.success-banner a{color:#2563eb;font-weight:600;text-decoration:underline}
.config-card{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px;margin-bottom:12px}
.config-card h3{font-size:14px;font-weight:600;color:#92400e;margin-bottom:8px}
.config-card p{font-size:13px;color:#78350f;margin-bottom:8px}
.config-card input{font-size:12px}
.gut-feel-area{text-align:center;padding:20px 0}
.gut-feel-stars{display:flex;justify-content:center;gap:8px;margin:16px 0}
.gut-feel-stars .star-btn svg{width:40px;height:40px}
.gut-feel-label{font-size:24px;font-weight:700;color:#1f2937;margin-top:8px}
.save-indicator{font-size:11px;display:flex;align-items:center;gap:4px;font-weight:500}
.save-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-dot.green{background:#16a34a}
.save-dot.orange{background:#f59e0b}
.save-dot.pulse{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:#6b7280}
.loading-spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.draft-list{padding:0;list-style:none}
.draft-item{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.draft-item-info{flex:1;min-width:0}
.draft-item-name{font-size:14px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-item-meta{font-size:11px;color:#6b7280;margin-top:2px}
.draft-item-actions{display:flex;gap:6px;flex-shrink:0}
.draft-item-actions button{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none}
.btn-resume{background:#2563eb;color:#fff}
.btn-resume:active{background:#1d4ed8}
.btn-delete-draft{background:#fef2f2;color:#dc2626}
.btn-delete-draft:active{background:#fee2e2}
.compress-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6b7280;margin-left:8px}
.storage-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:8px}
@media print{.sticky,button,input[type="file"],.header,.section-pills,.nav-row{display:none!important}body{font-size:12px}}
</style>
</head>

<div id="root"></div>

    compass: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
    heart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
    camera: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
    ruler: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2M11.5 9.5l2-2M8.5 6.5l2-2M17.5 15.5l2-2"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    starFill: <svg width={size} height={size} viewBox="0 0 24 24" fill="#facc15" stroke="#facc15" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,

  return icons[name] || null;
};

// ─── IndexedDB Storage Layer ───
const EvalStorage = {
  db: null,
  DB_NAME: "warehouseEvals",
  DB_VERSION: 1,

  open() {
    if (this.db) return Promise.resolve(this.db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("drafts")) {
          db.createObjectStore("drafts", { keyPath: "draftId" });
        }
        if (!db.objectStoreNames.contains("blobs")) {
          const store = db.createObjectStore("blobs", { keyPath: ["draftId", "blobType", "blobId"] });
          store.createIndex("byDraft", "draftId", { unique: false });
        }
      };
      req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
      req.onerror = (e) => reject(e.target.error);
    });
  },

  async saveDraftMeta(draftId, state) {
    const db = await this.open();
    const sectionsClean = state.sections.map(s => ({
      ...s,
      photos: s.photos.map(p => ({ id: p.id, label: p.label, timestamp: p.timestamp }))
    }));
    const record = {
      draftId,
      site: state.site,
      sections: sectionsClean,
      gutScore: state.gutScore,
      gutNotes: state.gutNotes,
      tiItems: state.tiItems,
      miscNotes: state.miscNotes,
      updatedAt: Date.now(),
      createdAt: state.createdAt || Date.now()
    };
    return new Promise((resolve, reject) => {
      const tx = db.transaction("drafts", "readwrite");
      tx.objectStore("drafts").put(record);
      tx.oncomplete = () => {
        this._updateIndex(draftId, state.site, sectionsClean);
        resolve();
      };
      tx.onerror = (e) => reject(e.target.error);
    });
  },

  _updateIndex(draftId, site, sections) {
    try {
      const idx = JSON.parse(localStorage.getItem("jetson_draft_index") || "[]");
      const photoCount = sections.reduce((a, s) => a + s.photos.length, 0);
      const existing = idx.findIndex(d => d.draftId === draftId);
      const entry = {
        draftId,
        propertyName: site.propertyName || "",
        address: site.address || "",
        city: site.city || "",
        date: site.date || "",
        evaluator: site.evaluator || "",
        photoCount,
        updatedAt: Date.now()
      };
      if (existing >= 0) idx[existing] = entry; else idx.push(entry);
      localStorage.setItem("jetson_draft_index", JSON.stringify(idx));
    } catch (e) {}
  },

  async saveBlob(draftId, blobType, blobId, sectionId, dataUrl, label) {
    const db = await this.open();
    const record = { draftId, blobType, blobId: String(blobId), sectionId, data: dataUrl, label, timestamp: Date.now() };
    return new Promise((resolve, reject) => {
      const tx = db.transaction("blobs", "readwrite");
      tx.objectStore("blobs").put(record);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  },

  async deleteBlob(draftId, blobType, blobId) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("blobs", "readwrite");
      tx.objectStore("blobs").delete([draftId, blobType, String(blobId)]);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  },

  async loadDraft(draftId) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(["drafts", "blobs"], "readonly");
      let meta = null;
      const blobs = [];

      const metaReq = tx.objectStore("drafts").get(draftId);
      metaReq.onsuccess = () => { meta = metaReq.result; };

      const blobIdx = tx.objectStore("blobs").index("byDraft");
      const blobReq = blobIdx.openCursor(IDBKeyRange.only(draftId));
      blobReq.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) { blobs.push(cursor.value); cursor.continue(); }
      };

      tx.oncomplete = () => {
        if (!meta) { resolve(null); return; }
        const photoMap = {};
        let sketchData = null;
        for (const b of blobs) {
          if (b.blobType === "sketch") { sketchData = b.data; }
          else if (b.blobType === "photo") {
            if (!photoMap[b.sectionId]) photoMap[b.sectionId] = [];
            photoMap[b.sectionId].push({ id: Number(b.blobId), data: b.data, label: b.label, timestamp: b.timestamp });
          }
        }
        const sections = meta.sections.map(s => ({
          ...s,
          photos: (photoMap[s.id] || []).sort((a, b) => a.id - b.id)
        }));
        resolve({ ...meta, sections, sketch: sketchData });
      };
      tx.onerror = (e) => reject(e.target.error);
    });
  },

  listDrafts() {
    try {
      return JSON.parse(localStorage.getItem("jetson_draft_index") || "[]")
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    } catch (e) { return []; }
  },

  async deleteDraft(draftId) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(["drafts", "blobs"], "readwrite");
      tx.objectStore("drafts").delete(draftId);
      const blobIdx = tx.objectStore("blobs").index("byDraft");
      const req = blobIdx.openCursor(IDBKeyRange.only(draftId));
      req.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) { cursor.delete(); cursor.continue(); }
      };
      tx.oncomplete = () => {
        try {
          const idx = JSON.parse(localStorage.getItem("jetson_draft_index") || "[]");
          localStorage.setItem("jetson_draft_index", JSON.stringify(idx.filter(d => d.draftId !== draftId)));
        } catch (e) {}
        if (localStorage.getItem("jetson_active_draft") === draftId) {
          localStorage.removeItem("jetson_active_draft");
        }
        resolve();
      };
      tx.onerror = (e) => reject(e.target.error);
    });
  }
};

// ─── Photo Compression ───
function compressPhoto(dataUrl, maxDim = 1600, quality = 0.7) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const ratio = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

    const file = e.target.files[0];

      const compressed = await compressPhoto(ev.target.result);

// ─── Sketch Canvas ───
function SketchCanvas({ sketchData, onSave }) {
  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const [tool, setTool] = useState("pen");
  const [color, setColor] = useState("#1e40af");
  const [lineWidth, setLineWidth] = useState(3);
  const lastPos = useRef(null);

  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    c.width = c.offsetWidth * 2; c.height = 600;
    ctx.scale(2, 1);
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, c.width, c.height);
    ctx.strokeStyle = "#e5e7eb"; ctx.lineWidth = 0.5;
    for (let x = 0; x < c.width/2; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,c.height); ctx.stroke(); }
    for (let y = 0; y < c.height; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(c.width/2,y); ctx.stroke(); }
    if (sketchData) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, c.width/2, c.height); img.src = sketchData; }
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left), y: (t.clientY - rect.top) * (600 / rect.height) };
  };
  const startDraw = (e) => { e.preventDefault(); setIsDrawing(true); lastPos.current = getPos(e); };
  const draw = (e) => {
    if (!isDrawing) return; e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === "eraser" ? "#fff" : color;
    ctx.lineWidth = tool === "eraser" ? 20 : lineWidth;
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const endDraw = () => { if (isDrawing) { setIsDrawing(false); onSave(canvasRef.current.toDataURL("image/jpeg", 0.8)); } };
  const clearCanvas = () => {
    const c = canvasRef.current; const ctx = c.getContext("2d");
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, c.width, c.height);
    ctx.strokeStyle = "#e5e7eb"; ctx.lineWidth = 0.5;
    for (let x = 0; x < c.width/2; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,c.height); ctx.stroke(); }
    for (let y = 0; y < c.height; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(c.width/2,y); ctx.stroke(); }
    onSave(null);
  };

  return (
    <div>
      <div className="canvas-tools">
        <button className={`tool-btn ${tool==="pen"?"active":""}`} onClick={()=>setTool("pen")}>Pen</button>
        <button className={`tool-btn ${tool==="eraser"?"active":""}`} onClick={()=>setTool("eraser")}>Eraser</button>
        <select value={lineWidth} onChange={e=>setLineWidth(Number(e.target.value))} style={{width:"auto",padding:"6px 8px",fontSize:"13px"}}>
          <option value={2}>Thin</option><option value={3}>Medium</option><option value={5}>Thick</option>
        </select>
        <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:32,height:32,padding:0,border:"none",borderRadius:6,cursor:"pointer"}} />
        <button className="tool-btn danger" onClick={clearCanvas} style={{marginLeft:"auto"}}>Clear</button>
      </div>
      <div className="canvas-wrap">
        <canvas ref={canvasRef} style={{height:300}}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw} />
      </div>
    </div>
  );
}

// ─── Drive Upload Logic (Form-based, fully CORS-safe) ───
function postViaForm(scriptUrl, payload, waitMs) {
  return new Promise((resolve, reject) => {
    try {
      const id = "gas_" + Date.now() + "_" + Math.random().toString(36).slice(2);
      const iframe = document.createElement("iframe");
      iframe.name = id;
      iframe.style.display = "none";
      document.body.appendChild(iframe);
      const form = document.createElement("form");
      form.method = "POST";
      form.action = scriptUrl;
      form.target = id;
      form.style.display = "none";
      const input = document.createElement("input");
      input.type = "hidden";
      input.name = "payload";
      input.value = JSON.stringify(payload);
      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        try { form.remove(); iframe.remove(); } catch(e) {}
        resolve({ success: true });
      }, waitMs || 3000);
    } catch (err) {
      reject(err);
    }
  });
}

async function submitToDrive(scriptUrl, siteInfo, sections, sketchData, gutScore, gutNotes, overallScore, tiItems, miscNotes, onProgress) {
  const totalPhotos = sections.reduce((a,s) => a + s.photos.length, 0);
  const totalSteps = totalPhotos + (sketchData ? 1 : 0) + 1;
  let completed = 0;

  completed++;
  onProgress({ step: "Creating folder & saving summary...", pct: Math.round((completed / totalSteps) * 100) });

  await postViaForm(scriptUrl, {
    action: "submit_evaluation",
    siteInfo,
    sections: sections.map(s => ({
      name: s.name,
      criteria: s.criteria.map(c => ({ label: c.label, score: c.score, notes: c.notes })),
      measurements: s.measurements.map(m => ({ label: m.label, value: m.value })),
      photoCount: s.photos.length
    })),
    gutFeelScore: gutScore,
    gutFeelNotes: gutNotes,
    tiRequests: (tiItems||[]).filter(i=>i.text).map(i=>({description:i.text,estimatedCost:i.est})),
    miscNotes: miscNotes || "",
    overallScore,
    hasSketch: !!sketchData
  }, 5000);

  const siteKey = { state: siteInfo.state, city: siteInfo.city, propertyName: siteInfo.propertyName, address: siteInfo.address, date: siteInfo.date };

  for (const sec of sections) {
    for (const photo of sec.photos) {
      completed++;
      onProgress({ step: `Uploading ${photo.label}...`, pct: Math.round((completed / totalSteps) * 100) });
      await postViaForm(scriptUrl, {
        action: "upload_photo",
        siteKey,
        photoData: photo.data,
        photoName: photo.label.replace(/[^a-zA-Z0-9 #_-]/g, "") + ".jpg"
      }, 4000);
    }
  }

  if (sketchData) {
    completed++;
    onProgress({ step: "Uploading floor plan sketch...", pct: Math.round((completed / totalSteps) * 100) });
    await postViaForm(scriptUrl, {
      action: "upload_photo",
      siteKey,
      photoData: sketchData,
      photoName: "Floor Plan Sketch.png"
    }, 4000);
  }

  onProgress({ step: "Done!", pct: 100 });
  return { folderUrl: "https://drive.google.com/drive/folders/1bZZDFj0HycamRivMl1g-1l8f5UcGvPV-" };
}

    return { name:s.name, avg:avg.toFixed(1), scored:scored.length, total:s.criteria.length };

  const totalPhotos = sections.reduce((a,s)=>a+s.photos.length,0);
  const scoreClr = (v) => { const n=parseFloat(v); if(n>=4) return "score-green"; if(n>=3) return "score-yellow"; if(n>=1) return "score-red"; return "score-gray"; };

  };

  const handleSubmit = async () => {
    if (!scriptUrl) { setError("Please paste your Google Apps Script URL below first."); return; }
    setUploading(true); setError(null); setResult(null);
    try {
      const res = await submitToDrive(scriptUrl, siteInfo, sections, sketchData, gutScore, gutNotes, overall, tiItems, miscNotes, setProgress);
      setResult(res);
      if (onSubmitted) onSubmitted();
    } catch (err) {
      setError(err.message || "Upload failed. Check your connection and try again.");
    }
    setUploading(false);
  };

  const flags = sections.flatMap(s=>s.criteria.filter(c=>c.score>0&&c.score<=2).map(c=>({section:s.name,...c})));

  return (
    <div className="container" style={{paddingTop:20,paddingBottom:40}}>
      <div className="score-hero">
        <div className="label">Overall Score</div>
        <div className="big">{overall}</div>
        <div className="sub">{allScored.length} of {sections.flatMap(s=>s.criteria).length} criteria · {totalPhotos} photos{gutScore > 0 ? ` · Gut feel: ${GUT_LABELS[gutScore]}` : ""}</div>
      </div>
      {gutScore > 0 && (
        <div className="card" style={{textAlign:"center"}}>
          <h2 style={{marginBottom:4}}>Gut Feel: {GUT_LABELS[gutScore]}</h2>
          <div style={{display:"flex",justifyContent:"center",gap:4,margin:"8px 0"}}>
            {[1,2,3,4,5].map(s=><Icon key={s} name={s<=gutScore?"starFill":"star"} size={24} color={s<=gutScore?"#facc15":"#d1d5db"}/>)}
          </div>
          {gutNotes && <p style={{fontSize:13,color:"#4b5563",marginTop:8}}>{gutNotes}</p>}
        </div>
      )}
      <div style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:8}}>Section Breakdown</h3>
        {sScores.map(s => (
          <div key={s.name} className="score-row">
            <div><div className="name">{s.name}</div><div className="detail">{s.scored}/{s.total} scored</div></div>
            <div className="score-bar-wrap">
              <div className="score-bar"><div className="score-bar-fill" style={{width:(parseFloat(s.avg)/5*100)+"%"}}/></div>
              <div className={`score-num ${scoreClr(s.avg)}`}>{s.avg}</div>
            </div>
          </div>
        ))}
      </div>
      {flags.length > 0 && (
        <div className="flags">
          <h3>Flagged Items (Score 2 or below)</h3>
          {flags.map((f,i) => (
            <div key={i} className="flag-item">
              <strong>{f.section}:</strong> {f.label} — {f.score}/5
              {f.notes && <div className="flag-note">{f.notes}</div>}
            </div>
          ))}
        </div>
      )}

      {tiItems && tiItems.length > 0 && (
        <div className="card" style={{marginBottom:12}}>
          <h3 style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <Icon name="wrench" size={16} color="#2563eb"/> TI Requests ({tiItems.length})
          </h3>
          {tiItems.map((item,idx) => (
            <div key={item.id} style={{fontSize:13,padding:"6px 0",borderBottom:"1px solid #f3f4f6",display:"flex",gap:6}}>
              <span style={{fontWeight:600,color:"#6b7280"}}>{idx+1}.</span>
              <div>
                <span>{item.text || "\u2014"}</span>
                {item.est && <span style={{color:"#6b7280",marginLeft:6}}>({item.est})</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:8}}>Notes</h3>
        <textarea placeholder="Any other observations, follow-ups, or things to remember about this site..." value={miscNotes} onChange={e=>onSetMiscNotes(e.target.value)} style={{minHeight:100}}/>
      </div>

      {result ? (
        <div className="success-banner">
          <p style={{fontSize:16,fontWeight:700,color:"#16a34a",marginBottom:4}}>Submitted to Google Drive</p>
          <p style={{fontSize:13,color:"#4b5563"}}>Evaluation, photos, and sketch saved.</p>
          <a href={result.folderUrl} target="_blank" rel="noopener" style={{fontSize:14}}>Open folder in Drive</a>
        </div>
      ) : uploading ? (
        <div className="submit-progress">
          <div className="prog-text" style={{fontWeight:600}}>Uploading to Google Drive...</div>
          <div className="prog-bar"><div className="prog-fill" style={{width:progress.pct+"%"}}/></div>
          <div className="prog-status">{progress.step} ({progress.pct}%)</div>
        </div>
      ) : (
        <>
          <button className="btn btn-submit" style={{marginBottom:12}} onClick={handleSubmit} disabled={!scriptUrl}>
            <Icon name="upload" size={18} color="#fff"/> Submit to Google Drive
          </button>
          {!scriptUrl && (
            <div className="config-card">
              <h3>Connect to Google Drive</h3>
              <p>Paste your Google Apps Script deployment URL below. You only need to do this once — it'll be remembered.</p>
              <input placeholder="https://script.google.com/macros/s/..." onChange={e=>onSetScriptUrl(e.target.value)} style={{fontSize:12}}/>
            </div>
          )}
        </>
      )}
      {error && <div className="flags" style={{marginBottom:12}}><p style={{fontSize:13,margin:0}}>{error}</p></div>}

      <button className="btn btn-primary" style={{marginBottom:12}} onClick={()=>window.print()}>
        <Icon name="file" size={18} color="#fff"/> Print / Save as PDF
      </button>
      <button className="btn btn-secondary" style={{marginBottom:12}} onClick={exportJSON}>
        <Icon name="download" size={18} color="#2563eb"/> Export Data (JSON)
      </button>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [isLoading, setIsLoading] = useState(true);
  const [draftId, setDraftId] = useState(null);
  const [showDraftPicker, setShowDraftPicker] = useState(false);
  const [saveStatus, setSaveStatus] = useState("saved");
  const [storageQuota, setStorageQuota] = useState(null);
  const saveTimer = useRef(null);
  const createdAt = useRef(Date.now());

  const [sections, setSections] = useState(JSON.parse(JSON.stringify(DEFAULT_SECTIONS)));
  const [tab, setTab] = useState("info");
  const [secIdx, setSecIdx] = useState(0);
  const [sketch, setSketch] = useState(null);
  const [showCustom, setShowCustom] = useState(false);
  const [gutScore, setGutScore] = useState(0);
  const [gutNotes, setGutNotes] = useState("");
  const [tiItems, setTiItems] = useState([]);
  const [miscNotes, setMiscNotes] = useState("");
  const addTI = () => setTiItems(p=>[...p,{id:Date.now(),text:"",est:""}]);
  const updateTI = (id,k,v) => setTiItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i));
  const removeTI = (id) => setTiItems(p=>p.filter(i=>i.id!==id));
  const [scriptUrl, setScriptUrl] = useState(() => {
    try { return window.localStorage?.getItem("jetson_script_url") || ""; } catch(e) { return ""; }
  });
  const handleSetScriptUrl = (url) => {
    setScriptUrl(url);
    try { window.localStorage?.setItem("jetson_script_url", url); } catch(e) {}
  };
  const [site, setSite] = useState({...DEFAULT_SITE});

  const upSite = (k,v) => setSite(p=>({...p,[k]:v}));
  const upCrit = (si,ci,k,v) => setSections(p=>{const n=[...p];n[si]={...n[si],criteria:[...n[si].criteria]};n[si].criteria[ci]={...n[si].criteria[ci],[k]:v};return n;});
  const upMeas = (si,mi,v) => setSections(p=>{const n=[...p];n[si]={...n[si],measurements:[...n[si].measurements]};n[si].measurements[mi]={...n[si].measurements[mi],value:v};return n;});

  // ─── Photo add/remove with immediate blob persistence ───
  const addPhoto = useCallback((si, ph) => {
    setSections(p => {
      const n = [...p];
      n[si] = { ...n[si], photos: [...n[si].photos, ph] };
      return n;
    });
    if (draftId) {
      const secId = sections[si]?.id || String(si);
      EvalStorage.saveBlob(draftId, "photo", String(ph.id), secId, ph.data, ph.label).catch(() => {});
    }
  }, [draftId, sections]);

  const rmPhoto = useCallback((si, id) => {
    setSections(p => {
      const n = [...p];
      n[si] = { ...n[si], photos: n[si].photos.filter(x => x.id !== id) };
      return n;
    });
    if (draftId) {
      EvalStorage.deleteBlob(draftId, "photo", String(id)).catch(() => {});
    }
  }, [draftId]);

  // ─── Sketch save with immediate blob persistence ───
  const handleSketchSave = useCallback((data) => {
    setSketch(data);
    if (draftId) {
      if (data) {
        EvalStorage.saveBlob(draftId, "sketch", "main", null, data, "Floor Plan Sketch").catch(() => {});
      } else {
        EvalStorage.deleteBlob(draftId, "sketch", "main").catch(() => {});
      }
    }
  }, [draftId]);

  const done = sections.filter(s=>s.criteria.some(c=>c.score>0)).length;

  // ─── Debounced auto-save for metadata ───
  useEffect(() => {
    if (!draftId || isLoading) return;
    setSaveStatus("unsaved");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSaveStatus("saving");
      EvalStorage.saveDraftMeta(draftId, {
        site, sections, gutScore, gutNotes, tiItems, miscNotes, createdAt: createdAt.current
      }).then(() => {
        setSaveStatus("saved");
      }).catch(() => {
        setSaveStatus("unsaved");
      });
    }, 1000);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [site, sections, gutScore, gutNotes, tiItems, miscNotes, draftId, isLoading]);

  // ─── beforeunload warning ───
  useEffect(() => {
    const handler = (e) => {
      if (saveStatus !== "saved") { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [saveStatus]);

  // ─── Init: open DB, check for active draft ───
  useEffect(() => {
    (async () => {
      try {
        await EvalStorage.open();
        const activeDraftId = localStorage.getItem("jetson_active_draft");
        if (activeDraftId) {
          const data = await EvalStorage.loadDraft(activeDraftId);
          if (data) {
            setSite(data.site);
            setSections(data.sections);
            setGutScore(data.gutScore || 0);
            setGutNotes(data.gutNotes || "");
            setTiItems(data.tiItems || []);
            setMiscNotes(data.miscNotes || "");
            setSketch(data.sketch || null);
            createdAt.current = data.createdAt || Date.now();
            setDraftId(activeDraftId);
            setIsLoading(false);
            return;
          }
        }
        const drafts = EvalStorage.listDrafts();
        if (drafts.length > 0) {
          setShowDraftPicker(true);
        } else {
          const newId = "draft_" + Date.now();
          setDraftId(newId);
          localStorage.setItem("jetson_active_draft", newId);
        }
      } catch (e) {
        const newId = "draft_" + Date.now();
        setDraftId(newId);
        localStorage.setItem("jetson_active_draft", newId);
      }
      setIsLoading(false);
    })();
  }, []);

  // ─── Check storage quota ───
  useEffect(() => {
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate().then(est => {
        if (est.quota) {
          setStorageQuota({ pctUsed: Math.round((est.usage / est.quota) * 100) });
        }
      }).catch(() => {});
    }
  }, [sections]);

  // ─── Draft picker handlers ───
  const handleResumeDraft = async (id) => {
    setIsLoading(true);
    setShowDraftPicker(false);
    try {
      const data = await EvalStorage.loadDraft(id);
      if (data) {
        setSite(data.site);
        setSections(data.sections);
        setGutScore(data.gutScore || 0);
        setGutNotes(data.gutNotes || "");
        setTiItems(data.tiItems || []);
        setMiscNotes(data.miscNotes || "");
        setSketch(data.sketch || null);
        createdAt.current = data.createdAt || Date.now();
        setDraftId(id);
        localStorage.setItem("jetson_active_draft", id);
        setTab("info");
      }
    } catch (e) {}
    setIsLoading(false);
  };

  const handleNewDraft = () => {
    const newId = "draft_" + Date.now();
    setSite({...DEFAULT_SITE});
    setSections(JSON.parse(JSON.stringify(DEFAULT_SECTIONS)));
    setGutScore(0);
    setGutNotes("");
    setTiItems([]);
    setMiscNotes("");
    setSketch(null);
    createdAt.current = Date.now();
    setDraftId(newId);
    localStorage.setItem("jetson_active_draft", newId);
    setShowDraftPicker(false);
    setTab("info");
  };

  const handleDeleteDraft = async (id) => {
    await EvalStorage.deleteDraft(id);
  };

  const handleSubmitted = async () => {
    if (draftId) {
      await EvalStorage.deleteDraft(draftId);
    }
  };

  // ─── Loading screen ───
  if (isLoading) {
    return (
      <div className="loading-screen">
        <div className="loading-spinner"/>
        <p style={{fontSize:14}}>Loading evaluation...</p>
      </div>
    );
  }

  // ─── Draft picker ───
  if (showDraftPicker || !draftId) {
    return <DraftPicker onResume={handleResumeDraft} onNew={handleNewDraft} onDelete={handleDeleteDraft}/>;
  }

  const tabs = [{id:"info",label:"Site Info"},{id:"eval",label:"Evaluate"},{id:"sketch",label:"Sketch"},{id:"gut",label:"Gut Feel"},{id:"ti",label:"TI Requests"},{id:"summary",label:"Summary"}];

  return (
    <div>
      <div className="header">
        <div className="header-inner">
          <h1><Icon name="building" size={22} color="#2563eb"/> Site Evaluator</h1>
          <div className="flex-center">
            <div className="save-indicator">
              <span className={`save-dot ${saveStatus==="saved"?"green":saveStatus==="saving"?"orange pulse":"orange"}`}/>
              <span style={{color:saveStatus==="saved"?"#16a34a":"#f59e0b"}}>
                {saveStatus==="saved"?"Saved":saveStatus==="saving"?"Saving...":"Unsaved"}
              </span>
            </div>
            <span className="badge">{done}/{sections.length}</span>
            <button className="settings-btn" onClick={()=>setShowDraftPicker(true)} title="My Evaluations"><Icon name="list" size={20} color="#6b7280"/></button>
            <button className="settings-btn" onClick={()=>setShowCustom(true)}><Icon name="settings" size={20} color="#6b7280"/></button>
          </div>
        </div>
        <div className="tabs">
          {tabs.map(t=><button key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </div>

      {/* Site Info */}
      {tab==="info" && (
        <div className="container" style={{paddingTop:20,paddingBottom:40}}>
          <div className="card">
            <h2>Property</h2>
            <input placeholder="Property Name" value={site.propertyName} onChange={e=>upSite("propertyName",e.target.value)} style={{marginBottom:8}} />
            <input placeholder="Street Address" value={site.address} onChange={e=>upSite("address",e.target.value)} style={{marginBottom:8}} />
            <div className="grid-3">
              <input placeholder="City" value={site.city} onChange={e=>upSite("city",e.target.value)} />
              <input placeholder="State" value={site.state} onChange={e=>upSite("state",e.target.value)} />
              <input placeholder="ZIP" value={site.zip} onChange={e=>upSite("zip",e.target.value)} />
            </div>
          </div>
          <div className="card">
            <h2>Listing</h2>
            <div className="grid-2">
              <input placeholder="Landlord / Owner" value={site.landlord} onChange={e=>upSite("landlord",e.target.value)} />
              <input placeholder="Broker" value={site.broker} onChange={e=>upSite("broker",e.target.value)} />
              <input placeholder="Asking Rate ($/SF)" value={site.askingRate} onChange={e=>upSite("askingRate",e.target.value)} />
              <input placeholder="Available SF" value={site.availableSF} onChange={e=>upSite("availableSF",e.target.value)} />
              <input placeholder="Year Built" value={site.yearBuilt} onChange={e=>upSite("yearBuilt",e.target.value)} />
              <input placeholder="Zoning" value={site.zoning} onChange={e=>upSite("zoning",e.target.value)} />
            </div>
          </div>
          <div className="card">
            <h2>Tour</h2>
            <div className="grid-2">
              <input placeholder="Your Name" value={site.evaluator} onChange={e=>upSite("evaluator",e.target.value)} />
              <input type="date" value={site.date} onChange={e=>upSite("date",e.target.value)} />
            </div>
          </div>
          <button className="btn btn-primary" onClick={()=>setTab("eval")}>Start Evaluation <Icon name="chevRight" size={18} color="#fff"/></button>
        </div>
      )}

      {/* Evaluate */}
      {tab==="eval" && (
        <div className="container" style={{paddingTop:16,paddingBottom:40}}>
          <div className="section-pills">
            {sections.map((s,i) => {
              const hasSc = s.criteria.some(c=>c.score>0);
              return <button key={s.id} className={`pill ${i===secIdx?"active":hasSc?"done":""}`} onClick={()=>setSecIdx(i)}>
                <Icon name={s.icon} size={16}/>{s.name.split(" & ")[0].split(" / ")[0]}
              </button>;
            })}
          </div>
          {(()=>{
            const s = sections[secIdx];
            return <>
              <h2 style={{fontSize:16,fontWeight:700,margin:"12px 0",display:"flex",alignItems:"center",gap:8}}>
                <Icon name={s.icon} size={20} color="#2563eb"/>{s.name}
              </h2>
              <div className="card" style={{padding:0}}>
                {s.criteria.map((c,ci)=>(
                  <div key={c.id} className="criterion">
                    <div className="criterion-top">
                      <span className="criterion-label">{c.label}</span>
                      <StarRating score={c.score} onChange={v=>upCrit(secIdx,ci,"score",v)}/>
                    </div>
                    <input placeholder="Notes..." value={c.notes} onChange={e=>upCrit(secIdx,ci,"notes",e.target.value)} style={{background:"#f9fafb",fontSize:13,padding:"8px 10px"}}/>
                  </div>
                ))}
              </div>
              <div className="card">
                <h3><Icon name="ruler" size={16}/> Measurements</h3>
                <div className="grid-2">
                  {s.measurements.map((m,mi)=>(
                    <div key={m.id}><div className="measure-label">{m.label}</div>
                    <input value={m.value} onChange={e=>upMeas(secIdx,mi,e.target.value)}/></div>
                  ))}
                </div>
              </div>
              <div className="card">
                <h3><Icon name="camera" size={16}/> Photos</h3>
                <PhotoCapture photos={s.photos} sectionName={s.name} onAdd={ph=>addPhoto(secIdx,ph)} onRemove={id=>rmPhoto(secIdx,id)} storageQuota={storageQuota}/>
              </div>
              <div className="nav-row">
                {secIdx>0 && <button className="btn btn-secondary btn-nav" onClick={()=>setSecIdx(i=>i-1)}><Icon name="chevLeft" size={16} color="#2563eb"/> Prev</button>}
                {secIdx<sections.length-1
                  ? <button className="btn btn-primary btn-nav" onClick={()=>setSecIdx(i=>i+1)}>Next <Icon name="chevRight" size={16} color="#fff"/></button>
                  : <button className="btn btn-primary btn-nav" onClick={()=>setTab("sketch")}>Sketch <Icon name="chevRight" size={16} color="#fff"/></button>}
              </div>
            </>;
          })()}
        </div>
      )}

      {/* Sketch */}
      {tab==="sketch" && (
        <div className="container" style={{paddingTop:20,paddingBottom:40}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Icon name="pencil" size={20} color="#2563eb"/> Floor Plan Sketch
          </h2>
          <SketchCanvas sketchData={sketch} onSave={handleSketchSave}/>
          <div style={{marginTop:16}}>
            <button className="btn btn-primary" onClick={()=>setTab("gut")}>Gut Feel <Icon name="chevRight" size={18} color="#fff"/></button>
          </div>
        </div>
      )}

      {/* Gut Feel */}
      {tab==="gut" && (
        <div className="container" style={{paddingTop:20,paddingBottom:40}}>
          <div className="card">
            <div className="gut-feel-area">
              <Icon name="heart" size={32} color="#2563eb"/>
              <h2 style={{fontSize:18,fontWeight:700,marginTop:8,marginBottom:4}}>Overall Gut Feel</h2>
              <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Forget the numbers — how does this site feel?</p>
              <StarRating score={gutScore} onChange={setGutScore} large={true} />
              {gutScore > 0 && <div className="gut-feel-label">{GUT_LABELS[gutScore]}</div>}
            </div>
            <textarea placeholder="What stood out? Any dealbreakers? Would you bring the team back for a second look?" value={gutNotes} onChange={e=>setGutNotes(e.target.value)} style={{minHeight:120,marginTop:12}}/>
          </div>
          <button className="btn btn-primary" onClick={()=>setTab("ti")}>TI Requests <Icon name="chevRight" size={18} color="#fff"/></button>
        </div>
      )}

      {/* TI Requests */}
      {tab==="ti" && (
        <div className="container" style={{paddingTop:20,paddingBottom:40}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
            <Icon name="wrench" size={20} color="#2563eb"/> Tenant Improvement Requests
          </h2>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:16}}>What would you need the landlord to do before move-in?</p>

          {tiItems.length === 0 && (
            <div className="card" style={{textAlign:"center",padding:24,color:"#9ca3af"}}>
              <p style={{fontSize:14}}>No TI requests yet.</p>
              <p style={{fontSize:12,marginTop:4}}>Tap "Add Item" below to start your list.</p>
            </div>
          )}

          {tiItems.map((item,idx) => (
            <div key={item.id} className="card" style={{padding:12,marginBottom:8}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                <span style={{fontSize:13,fontWeight:700,color:"#6b7280",paddingTop:10,minWidth:20}}>{idx+1}.</span>
                <div style={{flex:1}}>
                  <input placeholder="Describe the improvement needed..." value={item.text} onChange={e=>updateTI(item.id,"text",e.target.value)} style={{marginBottom:6}}/>
                  <input placeholder="Estimated cost (optional)" value={item.est} onChange={e=>updateTI(item.id,"est",e.target.value)} style={{fontSize:12,padding:"8px 10px",background:"#f9fafb"}}/>
                </div>
                <button onClick={()=>removeTI(item.id)} style={{background:"none",border:"none",padding:8,color:"#ef4444",flexShrink:0}}>
                  <Icon name="trash" size={16} color="#ef4444"/>
                </button>
              </div>
            </div>
          ))}

          <button onClick={addTI} className="btn btn-secondary" style={{marginTop:8,marginBottom:16}}>
            <Icon name="plus" size={16} color="#2563eb"/> Add Item
          </button>

          <button className="btn btn-primary" onClick={()=>setTab("summary")}>View Summary <Icon name="chevRight" size={18} color="#fff"/></button>
        </div>
      )}

      {/* Summary */}
      {tab==="summary" && <SummaryView siteInfo={site} sections={sections} sketchData={sketch} gutScore={gutScore} gutNotes={gutNotes} tiItems={tiItems} miscNotes={miscNotes} onSetMiscNotes={setMiscNotes} scriptUrl={scriptUrl} onSetScriptUrl={handleSetScriptUrl} onSubmitted={handleSubmitted}/>}

      {showCustom && <CustomizeModal sections={sections} onSave={s=>{setSections(s);setShowCustom(false);}} onClose={()=>setShowCustom(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
